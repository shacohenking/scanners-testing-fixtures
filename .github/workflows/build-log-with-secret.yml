name: Build Log with Secret

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Build Log
        env:
          # This pulls your secret from Settings > Secrets and Variables > Actions
          MY_SUPER_SECRET: ${{ secrets.MY_SECRET_NAME }}
        run: |
          echo "Starting build process..." > build.log
          echo "Build timestamp: $(date)" >> build.log
          
          # Demonstrating how to use the secret in a log
          # Note: GitHub will likely mask this as *** in the console
          echo "The secret used for this build is: $MY_SUPER_SECRET" >> build.log
          echo "access_key: AKIARPIT7QCJZ5BR553U" >> build.log
          echo "secret_key: DSnPnbAH1QwEu+utk4ZWO/c1KlcYT4/1AgaJ5HLXL" >> build.log          
          echo "Build completed successfully." >> build.log

      - name: Upload Build Log Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build.log
