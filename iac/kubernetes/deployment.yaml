# IAC scanner testing fixtures - Kubernetes with known misconfigurations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-deployment
  labels:
    app: insecure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure-app
  template:
    metadata:
      labels:
        app: insecure-app
    spec:
      # CKV_K8S_21 - Default namespace used
      # CKV_K8S_40 - No resource limits
      containers:
        - name: insecure-container
          image: nginx:latest
          # CKV_K8S_20 - Running as root
          securityContext:
            runAsUser: 0
            privileged: false
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 80
          # No resource limits defined (CKV_K8S_11, CKV_K8S_12, CKV_K8S_13)
          # No liveness/readiness probes (CKV_K8S_8, CKV_K8S_9)
      # CKV_K8S_28 - No service account specified
      automountServiceAccountToken: true
      hostNetwork: true
      hostPID: true
      hostIPC: true
