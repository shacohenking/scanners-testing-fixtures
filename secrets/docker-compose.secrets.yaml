# Secrets scanner testing fixtures - Docker Compose file with hardcoded secrets
# This file intentionally contains fake secrets for scanner testing
#
# Expected findings:
#   1. Hardcoded AWS Access Key ID (AKIA pattern) in AWS_ACCESS_KEY_ID
#   2. Hardcoded Slack webhook URL in SLACK_WEBHOOK_URL

version: "3.8"

services:
  backend:
    image: myapp/backend:latest
    environment:
      # Finding 1: Hardcoded AWS Access Key ID (matches AKIA prefix pattern)
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_REGION: us-east-1

      # Finding 2: Hardcoded Slack Incoming Webhook URL
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/T01ABCDEF/B02GHIJKL/abcdefghijklmnopqrstuvwx

    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: appuser
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
